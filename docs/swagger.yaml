host: localhost:8080
info:
  contact:
    email: neolidy@outlook.com
    name: jiangfire
    url: https://github.com/jiangfire/flowx
  description: 企业级智能工具治理与流程编排平台 API 文档
  license:
    name: MIT
    url: https://github.com/jiangfire/flowx/blob/main/LICENSE
  termsOfService: https://github.com/jiangfire/flowx
  title: FlowX API
  version: "1.0"
paths:
  /agent/tasks:
    get:
      consumes:
      - application/json
      description: 分页查询Agent任务列表，支持按状态筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 任务状态
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/git_neolidy_top_neo_flowx_pkg_response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/git_neolidy_top_neo_flowx_pkg_response.APIResponse'
      security:
      - BearerAuth: []
      summary: 任务列表
      tags:
      - Agent智能体
    post:
      consumes:
      - application/json
      description: 创建Agent任务并自动执行
      parameters:
      - description: 创建任务请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_interfaces_http_handler.createTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/git_neolidy_top_neo_flowx_pkg_response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/git_neolidy_top_neo_flowx_pkg_response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/git_neolidy_top_neo_flowx_pkg_response.APIResponse'
      security:
      - BearerAuth: []
      summary: 创建并执行任务
      tags:
      - Agent智能体
  /agent/tasks/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取Agent任务详细信息
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
