      security:
      - BearerAuth: []
      summary: 任务详情
      tags:
      - Agent智能体
  /agent/tasks/{id}/approve:
    post:
      consumes:
      - application/json
      description: 审批通过指定的Agent任务
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      - description: '审批请求 {comment: string}'
        in: body
        name: request
        schema:
          type: object
      produces:
