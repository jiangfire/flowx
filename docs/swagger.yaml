        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/git_neolidy_top_neo_flowx_pkg_response.APIResponse'
      security:
      - BearerAuth: []
      summary: 审批通过任务
      tags:
      - Agent智能体
  /agent/tasks/{id}/reject:
    post:
