server:
  host: 0.0.0.0
  port: 8080
  mode: "debug"  # debug / release / test
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

database:
  # driver: "sqlite"          # 取消注释将使用 SQLite（无需 PostgreSQL，开箱即用）
  # path: "file:flowx.db"     # SQLite 文件路径
  host: "localhost"
  port: 5432
  user: "flowx"
  password: "flowx123"
  dbname: "flowx"
  sslmode: "disable"
  max_idle_conns: 10
