services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowx
      POSTGRES_PASSWORD: flowx123
      POSTGRES_DB: flowx
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowx"]
      interval: 5s
      timeout: 3s
      retries: 5
