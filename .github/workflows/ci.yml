# FlowX CI 工作流
# 在每次推送和 PR 时自动运行代码检查、测试（SQLite + PostgreSQL）和构建

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 检查、测试 (SQLite) 与构建
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: 缓存 Go 模块
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 下载依赖
        run: go mod download

      - name: 代码静态检查 (go vet)
        run: go vet ./...

      - name: 代码质量检查 (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: goinstall
          args: ./...

      - name: 安全检查 (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: 运行测试
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: 显示测试覆盖率
        run: |
          echo "## 测试覆盖率" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 构建二进制文件
        env:
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o flowx-server ./cmd/server

  integration-postgres:
    name: 集成测试 (PostgreSQL + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowx
          POSTGRES_PASSWORD: flowx123
          POSTGRES_DB: flowx
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: 缓存 Go 模块
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 下载依赖
        run: go mod download

      - name: 运行集成测试 (PostgreSQL + Redis)
        env:
          TEST_DB_DRIVER: postgres
          TEST_PG_DSN: "host=localhost port=5432 user=flowx password=flowx123 dbname=flowx sslmode=disable"
          TEST_REDIS_HOST: "localhost"
          TEST_REDIS_PORT: "6379"
        run: go test -race -v ./internal/infrastructure/persistence/... ./tests/e2e/... ./internal/infrastructure/cache/...
